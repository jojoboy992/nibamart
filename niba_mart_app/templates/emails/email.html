<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      body {
        margin: 0;
        padding: 0;
        background-color: #f9f9f9;
        font-family: Arial, sans-serif;
      }
      table {
        border-collapse: collapse;
      }
      .container {
        max-width: 600px;
        margin: 0 auto;
        background-color: #ffffff;
        border-radius: 10px;
        overflow: hidden;
        box-shadow: 0px 2px 8px rgba(0,0,0,0.1);
      }
      .header {
        background-color: #00b98e;
        color: #ffffff;
        text-align: center;
        padding: 20px;
      }
      .header img {
        max-width: 120px;
        margin-bottom: 10px;
      }
      .content {
        padding: 20px;
        color: #333333;
      }
      .code {
        font-size: 28px;
        font-weight: bold;
        color: #00b98e;
        text-align: center;
        margin: 20px 0;
      }
      .footer {
        text-align: center;
        font-size: 12px;
        color: #888888;
        padding: 15px;
        background-color: #f1f1f1;
      }
      @media only screen and (max-width: 600px) {
        .content {
          padding: 15px;
        }
        .code {
          font-size: 24px;
        }
      }
    </style>
  </head>
  <body>
    <table class="container" cellpadding="0" cellspacing="0" width="100%">
      <tr>
        <td class="header">
          <!-- inline image with cid -->
          <img src="cid:niba_logo" alt="Niba Mart Logo" />
          <h2>Verify Your Email</h2>
        </td>
      </tr>
      <tr>
        <td class="content">
          <p>Hello {{ user.username }},</p>
          <p>
            Thank you for signing up! Please use the code below to verify your email:
          </p>

          <div class="code">{{ code }}</div>

          <p>
            The code expires in <strong>10 minutes</strong>
          </p>
          <p>
            If you did not sign up, please ignore this email.
          </p>
        </td>
      </tr>
      <tr>
        <td class="footer">
          &copy; 2025 Niba Mart. All rights reserved.
        </td>
      </tr>
    </table>
  </body>
</html>
